<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Polski">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Polski Flashcards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--accent:#e94560;--accent2:#0f3460;--green:#00b894;--orange:#fdcb6e;--red:#e17055;--text:#eee;--text2:#aaa;--shadow:0 8px 32px rgba(0,0,0,.4)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:600px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:20px 0 10px}
.header h1{font-size:1.6em;background:linear-gradient(135deg,#e94560,#0f3460);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.header .sub{color:var(--text2);font-size:.85em}
.stats-bar{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.stat{flex:1;min-width:80px;background:var(--card);border-radius:12px;padding:10px;text-align:center}
.stat .num{font-size:1.4em;font-weight:700}
.stat .label{font-size:.7em;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.stat.green .num{color:var(--green)}
.stat.orange .num{color:var(--orange)}
.stat.red .num{color:var(--red)}
.modes{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.mode-btn{flex:1;min-width:100px;padding:10px 8px;border:none;border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:.8em;transition:.2s;border:2px solid transparent}
.mode-btn:hover{border-color:var(--accent)}
.mode-btn.active{background:var(--accent);border-color:var(--accent)}
.mode-btn .icon{font-size:1.3em;display:block;margin-bottom:4px}
.directions{display:flex;gap:6px;margin:8px 0 16px;justify-content:center}
.dir-btn{padding:6px 14px;border:2px solid var(--card2);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:.75em;transition:.2s}
.dir-btn:hover{border-color:var(--accent)}
.dir-btn.active{border-color:var(--accent);color:var(--text);background:rgba(233,69,96,.15)}
.card-container{flex:1;display:flex;align-items:center;justify-content:center;perspective:1000px;min-height:320px;margin:8px 0}
.flashcard{width:100%;max-width:500px;min-height:300px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.card-front{background:linear-gradient(145deg,#1a1a2e,#16213e);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.05)}
.card-back{background:linear-gradient(145deg,#16213e,#1a1a2e);box-shadow:var(--shadow);transform:rotateY(180deg);border:1px solid rgba(255,255,255,.05)}
.card-category{position:absolute;top:14px;left:18px;font-size:.65em;color:var(--accent);text-transform:uppercase;letter-spacing:1px;opacity:.7}
.card-counter{position:absolute;top:14px;right:18px;font-size:.7em;color:var(--text2)}
.card-word{font-size:1.6em;font-weight:600;line-height:1.4;margin-bottom:12px}
.card-hint{font-size:.8em;color:var(--text2);margin-top:8px;font-style:italic}
.card-example{font-size:.85em;color:var(--text2);margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);line-height:1.5;max-width:100%}
.card-example strong{color:var(--text);font-weight:500}
.tap-hint{position:absolute;bottom:16px;font-size:.7em;color:var(--text2);opacity:.5}
.bottom-bar{display:flex;gap:10px;margin:16px 0 8px;justify-content:center;align-items:center;flex-wrap:wrap}
.ans-btn{padding:10px 20px;border:none;border-radius:12px;font-size:.82em;font-weight:600;cursor:pointer;transition:.2s;min-width:90px}
.ans-btn:active{transform:scale(.95)}
.ans-btn.again{background:var(--red);color:#fff}
.ans-btn.hard{background:var(--orange);color:#333}
.ans-btn.good{background:var(--green);color:#fff}
.next-arrow{width:52px;height:52px;border-radius:50%;border:2px solid var(--card2);background:var(--card);color:var(--text);font-size:1.4em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.next-arrow:hover{border-color:var(--accent);background:rgba(233,69,96,.12);transform:scale(1.08)}
.next-arrow:active{transform:scale(.95)}
.progress-wrap{margin:8px 0;height:6px;background:var(--card);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s}
.quiz-options{display:flex;flex-direction:column;gap:10px;width:100%;max-width:500px;margin:16px auto}
.quiz-opt{padding:14px 20px;border:2px solid var(--card2);border-radius:14px;background:var(--card);color:var(--text);cursor:pointer;font-size:.95em;text-align:left;transition:.2s}
.quiz-opt:hover{border-color:var(--accent);background:rgba(233,69,96,.08)}
.quiz-opt.correct{border-color:var(--green);background:rgba(0,184,148,.15);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(225,112,85,.15);color:var(--red)}
.browse-list{flex:1;overflow-y:auto}
.browse-item{padding:14px 16px;background:var(--card);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.2s;border-left:3px solid transparent}
.browse-item:hover{border-left-color:var(--accent)}
.browse-item .pl{font-weight:600;margin-bottom:4px}
.browse-item .ru{font-size:.85em;color:var(--text2)}
.browse-item .status{float:right;font-size:.7em;padding:3px 8px;border-radius:8px;margin-left:8px}
.browse-item .status.new{background:rgba(233,69,96,.2);color:var(--accent)}
.browse-item .status.learning{background:rgba(253,203,110,.2);color:var(--orange)}
.browse-item .status.known{background:rgba(0,184,148,.2);color:var(--green)}
.filter-bar{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;align-items:center}
.filter-bar input{flex:1;min-width:150px;padding:8px 14px;border:2px solid var(--card2);border-radius:10px;background:var(--card);color:var(--text);font-size:.85em;outline:none}
.filter-bar input:focus{border-color:var(--accent)}
.filter-btn{padding:6px 12px;border:2px solid var(--card2);border-radius:10px;background:transparent;color:var(--text2);cursor:pointer;font-size:.75em;transition:.2s;white-space:nowrap}
.filter-btn.active{border-color:var(--accent);color:var(--text);background:rgba(233,69,96,.1)}
.session-done{text-align:center;padding:40px 20px}
.session-done h2{font-size:1.8em;margin-bottom:8px}
.session-done .emoji{font-size:3em;margin-bottom:16px}
.session-done p{color:var(--text2);margin-bottom:20px}
.restart-btn{padding:12px 32px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:1em;font-weight:600;cursor:pointer;transition:.2s}
.restart-btn:hover{opacity:.9;transform:scale(1.02)}
.kbd-hints{text-align:center;font-size:.65em;color:var(--text2);opacity:.4;margin-top:8px}
.kbd{background:var(--card);padding:2px 6px;border-radius:4px;font-family:monospace}
@media(max-width:480px){
  .card-word{font-size:1.3em}
  .app{padding:10px}
  .stat{min-width:60px;padding:8px}
  .stat .num{font-size:1.1em}
  .ans-btn{padding:8px 14px;font-size:.75em;min-width:70px}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS_RAW = [
["Na pozór","На первый взгляд, с виду","Nowy interfejs programu wydawał się na pozór skomplikowany, ale szybko się do niego przyzwyczaiłam.","Новый интерфейс программы казался на первый взгляд сложным, но я быстро к нему привыкла."],
["Mieć niewiele wspólnego z...","Иметь мало общего с...","Moja praca ma niewiele wspólnego z tym, co studiowałam na uczelni.","Моя работа имеет мало общего с тем, что я изучала в университете."],
["Sięgnąć po coś","Потянуться за чем-то, обратиться к чему-то","Sięgnęłam po telefon, żeby sprawdzić powiadomienia.","Я потянулась за телефоном, чтобы проверить уведомления."],
["Bardzo mnie to nęci","Это меня очень манит / искушает","Ten deser czekoladowy bardzo mnie nęci.","Этот шоколадный десерт очень меня манит."],
["Kwestionować czyjąś wiedzę","Ставить под сомнение чьи-то знания","Nikt nie kwestionuje twojej wiedzy.","Никто не ставит под сомнение твои знания."],
["Niechby nawet...","Но пусть бы даже... / Даже если бы...","Niechby nawet padało, i tak pójdziemy na spacer.","Даже если бы пошел дождь, мы все равно пойдем на прогулку."],
["O ile to jest w ogóle możliwe","Если это вообще возможно","Chciałabym dostać zwrot pieniędzy, o ile to jest w ogóle możliwe.","Я бы хотела получить возврат денег, если это вообще возможно."],
["Im więcej... tym bardziej...","Чем больше... тем более...","Im więcej używam wtyczek AI, tym bardziej oszczędzam czas.","Чем больше я использую ИИ-плагины, тем больше экономлю время."],
["Wizje rozwiały się","Видения / иллюзии развеялись","Moje wątpliwości rozwiały się po rozmowie z księgową.","Мои сомнения развеялись после разговора с бухгалтером."],
["Zwrócić się na dawne tory","Вернуться в прежнее русло","Po urlopie życie zwróciło się na dawne tory.","После отпуска жизнь вернулась в прежнее русло."],
["Noce zaś poświęcałem na naukę","Ночи же посвящал изучению","Noce zaś poświęcałam na naukę polskiego z książkami.","Ночи же я посвящала изучению польского с книгами."],
["Muszę się przyznać","Я должна признаться","Muszę się przyznać, że zjadłam ostatni kawałek ciasta.","Должна признаться, что я съела последний кусок торта."],
["Ulegać wahaniom","Подвергаться колебаниям / колебаться","Zasięgi naszych rolek w social mediach ulegają wahaniom.","Охваты наших рилс в соцсетях подвержены колебаниям."],
["Zacząć się wahać","Начать сомневаться / колебаться","Zaczęłam się wahać, czy kupić ten płaszcz, bo jest dość drogi.","Я начала сомневаться, покупать ли это пальто, потому что оно довольно дорогое."],
["Wobec trudności","Перед лицом трудностей","Zbyt jestem niecierpliwy wobec trudności.","Слишком я нетерпелив перед лицом трудностей."],
["W rzeczywistości","В действительности / На самом деле","Wyglądał na spokojnego, ale w rzeczywistości bardzo się denerwował.","Он выглядел спокойным, но в действительности очень нервничал."],
["Zawsze byłam przekonana, że...","Я всегда была убеждена, что...","Zawsze byłam przekonana, że automatyzacja biznesu to klucz do rozwoju.","Я всегда была убеждена, что автоматизация бизнеса — это ключ к развитию."],
["Odwlekać się","Откладываться / Затягиваться","Remont kuchni ciągle się odwleka, bo brakuje materiałów.","Ремонт кухни постоянно откладывается, потому что не хватает материалов."],
["Zapowiadać się pomyślnie","Обещать быть успешным","Ten nowy projekt wideo zapowiada się bardzo pomyślnie.","Этот новый видеопроект обещает быть очень успешным."],
["Zwłaszcza gdy...","Особенно когда...","Lubię pracować rano, zwłaszcza gdy w biurze jest jeszcze cicho.","Я люблю работать утром, особенно когда в офисе еще тихо."],
["Wysiłki muszą być uwieńczone powodzeniem","Усилия должны увенчаться успехом","Wierzę, że nasze wysiłki muszą być uwieńczone powodzeniem — za dużo pracy w to włożyliśmy.","Верю, что наши усилия должны увенчаться успехом — слишком много труда мы в это вложили."],
["Bądź pewna, że...","Будь уверена, что...","Bądź pewna, że paczka dotrze przed weekendem.","Будь уверена, что посылка придёт до выходных."],
["Mieć obawy co do czegoś","Иметь опасения / сомневаться","Mam obawy co do tego nowego pracownika — jest za mało doświadczony.","У меня есть опасения насчёт этого нового сотрудника — у него слишком мало опыта."],
["Usiłować","Пытаться / Стараться","Usiłuję otworzyć ten słoik z dżemem, ale zakrętka się zacięła.","Я пытаюсь открыть эту банку с джемом, но крышка застряла."],
["Ku mojemu zdumieniu","К моему удивлению","Ku mojemu zdumieniu, sklep był jeszcze otwarty o dziesiątej wieczorem.","К моему удивлению, магазин был ещё открыт в десять вечера."],
["Na skutek...","В результате... / Из-за...","Nasz lot do Hiszpanii został opóźniony na skutek silnej burzy.","Наш рейс в Испанию был задержан из-за сильной бури."],
["Niemniej jednak","Тем не менее / И всё же","Byłam wczoraj bardzo zmęczona, niemniej jednak poszłam na basen.","Вчера я была очень уставшей, тем не менее пошла в бассейн."],
["Przywrócić równowagę","Вернуть равновесие","Po trudnym tygodniu w pracy potrzebuję weekendu, żeby przywrócić równowagę.","После тяжёлой рабочей недели мне нужны выходные, чтобы вернуть равновесие."],
["Rozpacz / Rozpaczać","Отчаяние / Отчаиваться","Nie płacz, nie ma sensu tak rozpaczać z powodu jednego egzaminu.","Не плачь, нет смысла так убиваться из-за одного экзамена."],
["Stosunek","Отношение (к кому-либо)","Mam bardzo dobry stosunek do moich sąsiadów.","У меня очень хорошее отношение к моим соседям."],
["Zaleta","Достоинство / плюс / преимущество","Główną zaletą tego mieszkania jest duży balkon.","Главное достоинство этой квартиры — большой балкон."],
["Cierpienie","Страдание / мучение","Kiedy bolał mnie ząb, to było prawdziwe cierpienie.","Когда у меня болел зуб, это было настоящее мучение."],
["Składać się na","Складываться из / состоять из","Na tę kwotę składa się rachunek za prąd i wodę.","Эта сумма складывается из счета за электричество и воду."],
["Nie móc znieść","Не мочь терпеть / не выносить","Nie mogę już znosić tego hałasu za oknem.","Я больше не могу терпеть этот шум за окном."],
["Treść","Содержание","Treść tej umowy wynajmu jest dla mnie jasna.","Содержание этого договора аренды мне понятно."],
["Nie kojarzę","Не припоминаю / Не понимаю","Przepraszam, zupełnie nie kojarzę tej sytuacji.","Извините, я совершенно не припоминаю эту ситуацию."],
["Żal","Сожаление / печаль / жаль","Mam wielki żal, że nie pojechaliśmy wczoraj nad morze.","Мне очень жаль, что мы не поехали вчера на море."],
["Uścisnąć dłoń","Пожать руку","Na pożegnanie sąsiad mocno uścisnął mi dłoń.","На прощание сосед крепко пожал мне руку."],
["Przystępnie","Доступно / понятно","Lekarz wyjaśnił mi moje wyniki badań bardzo przystępnie.","Врач объяснил мне мои результаты анализов очень доступно."],
["Zdrowy rozsądek","Здравый смысл","Wystarczy odrobina zdrowego rozsądku, żeby nie klikać w podejrzane linki.","Достаточно капли здравого смысла, чтобы не кликать по подозрительным ссылкам."],
["Nie do pomyślenia","Немыслимо","Wyjść z domu bez śniadania to dla mnie nie do pomyślenia.","Выйти из дома без завтрака для меня немыслимо."],
["Tracić na wartości","Терять в цене / ценность","Stare smartfony bardzo szybko tracą na wartości.","Старые смартфоны очень быстро теряют в цене."],
["Zdawać sobie sprawę","Отдавать себе отчет / понимать","Zdaję sobie sprawę, że to auto jest drogie, ale bardzo mi się podoba.","Я понимаю, что это авто дорогое, но оно мне очень нравится."],
["Nie do zniesienia","Невыносимый / невыносимо","Ten letni upał w mieście jest po prostu nie do zniesienia.","Эта летняя жара в городе просто невыносима."],
["Zrobić postępy","Сделать успехи / продвинуться","Moja córka zrobiła ogromne postępy w nauce pływania w tym miesiącu.","Моя дочь сделала огромные успехи в обучении плаванию в этом месяце."],
["Pokusić się o","Решиться на / попытаться","Pokusiłam się o zrobienie tortu na urodziny męża, chociaż nigdy wcześniej nie piekłam.","Я решилась сделать торт на день рождения мужа, хотя никогда раньше не пекла."],
["Mogę się pokusić","Я могу попытаться / рискнуть","Mogę się pokusić o ugotowanie czegoś tajskiego na kolację.","Могу попробовать приготовить что-нибудь тайское на ужин."],
["Wątpliwość","Сомнение","Kupiłam te bilety do Madrytu bez żadnych wątpliwości.","Я купила эти билеты в Мадрид без всяких сомнений."],
["Wątpić","Сомневаться","Czasami wątpię, czy kiedykolwiek opanuję polską gramatykę.","Иногда я сомневаюсь, освою ли когда-нибудь польскую грамматику."],
["Postępować naprzód","Продвигаться вперед","Remont naszej nowej kuchni w końcu postępuje naprzód.","Ремонт нашей новой кухни наконец-то продвигается вперед."],
["Postęp","Прогресс / продвижение","Cieszę się z twojego postępu w nauce języka — mówisz coraz lepiej!","Я рада твоему прогрессу в изучении языка — ты говоришь всё лучше!"],
["Przynajmniej","По крайней мере / хотя бы","Zgubiłam się w drodze do muzeum, ale przynajmniej wypiłam świetną kawę.","Я потерялась по пути в музей, но по крайней мере выпила отличный кофе."],
["Niewłaściwy","Неподходящий / неправильный","Kupiłam buty w niewłaściwym rozmiarze.","Я купила обувь неподходящего размера."],
["Nie bierz mi za złe","Не обижайся / не держи зла","Nie bierz mi za złe, ale ta sukienka ci nie pasuje.","Не обижайся, но это платье тебе не идёт."],
["Ścigać","Преследовать / гнаться","Mój kot uwielbia ścigać muchy po całym mieszkaniu.","Мой кот обожает гоняться за мухами по всей квартире."],
["Ohydny","Отвратительный / мерзкий","Ten syrop na kaszel ma ohydny smak.","Этот сироп от кашля имеет отвратительный вкус."],
["Pochłonięty","Поглощенный / увлеченный","Byłam wczoraj całkowicie pochłonięta nowym serialem i zapomniałam o kolacji.","Вчера я была полностью поглощена новым сериалом и забыла про ужин."],
["Na samo wspomnienie","При одном только воспоминании","Na samo wspomnienie tego obiadu w restauracji robi mi się niedobrze.","При одном воспоминании об этом обеде в ресторане мне становится дурно."],
["Skupić się / Skupiać się","Сосредоточиться / сосредотачиваться","Nie mogę się skupić na pracy, kiedy sąsiad wieci ścianę.","Не могу сосредоточиться на работе, когда сосед сверлит стену."],

const cards = CARDS_RAW.map((c, i) => ({
  id: i, pl: c[0], ru: c[1], exPl: c[2], exRu: c[3],
}));

const LS_KEY = 'polski_anki_v3';
function loadProgress() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; } }
function saveProgress(p) { localStorage.setItem(LS_KEY, JSON.stringify(p)); }

let progress = loadProgress();
let currentMode = 'study';
let currentDir = 'ru_pl';
let deck = [];
let deckIdx = 0;
let flipped = false;
let sessionStats = { total: 0, good: 0, hard: 0, again: 0, skipped: 0 };
let quizAnswer = null;
let searchQuery = '';
let filterStatus = 'all';

function getStatus(id) {
  const p = progress[id];
  if (!p) return 'new';
  if (p.score >= 3) return 'known';
  return 'learning';
}
function getStats() {
  let n=0,l=0,k=0;
  cards.forEach(c => { const s=getStatus(c.id); if(s==='new')n++;else if(s==='learning')l++;else k++; });
  return {new:n,learning:l,known:k,total:cards.length};
}
function shuffle(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}
function buildDeck() {
  const nw=cards.filter(c=>getStatus(c.id)==='new');
  const lr=cards.filter(c=>getStatus(c.id)==='learning');
  const kn=cards.filter(c=>getStatus(c.id)==='known');
  deck=[...shuffle(lr),...shuffle(nw).slice(0,15),...shuffle(kn).slice(0,5)];
  if(!deck.length) deck=shuffle([...cards]).slice(0,20);
  deckIdx=0; flipped=false;
  sessionStats={total:0,good:0,hard:0,again:0,skipped:0};
}
function getFront(card) {
  if(currentDir==='ru_pl') return {text:card.ru,lang:'RU',hint:'Переведи на польский'};
  return {text:card.pl,lang:'PL',hint:'Переведи на русский'};
}
function getBack(card) {
  if(currentDir==='ru_pl') return {text:card.pl,lang:'PL'};
  return {text:card.ru,lang:'RU'};
}

function render() {
  const app=document.getElementById('app');
  const stats=getStats();
  let html=`
    <div class="header">
      <h1>Polski Flashcards</h1>
      <div class="sub">${cards.length} fraz i slów do nauki</div>
    </div>
    <div class="stats-bar">
      <div class="stat red"><div class="num">${stats.new}</div><div class="label">Nowe</div></div>
      <div class="stat orange"><div class="num">${stats.learning}</div><div class="label">Uczenie</div></div>
      <div class="stat green"><div class="num">${stats.known}</div><div class="label">Znane</div></div>
    </div>
    <div class="modes">
      <button class="mode-btn ${currentMode==='study'?'active':''}" onclick="setMode('study')"><span class="icon">&#x1F4DA;</span>Karty</button>
      <button class="mode-btn ${currentMode==='quiz'?'active':''}" onclick="setMode('quiz')"><span class="icon">&#x2753;</span>Quiz</button>
      <button class="mode-btn ${currentMode==='browse'?'active':''}" onclick="setMode('browse')"><span class="icon">&#x1F4CB;</span>Lista</button>
    </div>`;

  if(currentMode!=='browse') {
    html+=`
    <div class="directions">
      <button class="dir-btn ${currentDir==='ru_pl'?'active':''}" onclick="setDir('ru_pl')">RU &#x2192; PL</button>
      <button class="dir-btn ${currentDir==='pl_ru'?'active':''}" onclick="setDir('pl_ru')">PL &#x2192; RU</button>
    </div>`;
  }

  if(currentMode==='study') html+=renderStudy();
  else if(currentMode==='quiz') html+=renderQuiz();
  else html+=renderBrowse();
  app.innerHTML=html;
}

function renderStudy() {
  if(!deck.length) buildDeck();
  if(deckIdx>=deck.length) return renderDone();
  const card=deck[deckIdx];
  const front=getFront(card);
  const back=getBack(card);
  const pct=deck.length>0?Math.round((deckIdx/deck.length)*100):0;

  let backExtra='';
  if(card.exPl) {
    backExtra=`<div class="card-example"><strong>${card.exPl}</strong><br>${card.exRu}</div>`;
  }

  let html=`
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card-container" onclick="flipCard()">
      <div class="flashcard ${flipped?'flipped':''}" id="flashcard">
        <div class="card-face card-front">
          <div class="card-category">${front.lang}</div>
          <div class="card-counter">${deckIdx+1} / ${deck.length}</div>
          <div class="card-word">${front.text}</div>
          <div class="card-hint">${front.hint}</div>
          <div class="tap-hint">&#x1F447; tap to flip</div>
        </div>
        <div class="card-face card-back">
          <div class="card-category">${back.lang}</div>
          <div class="card-counter">${deckIdx+1} / ${deck.length}</div>
          <div class="card-word">${back.text}</div>
          ${backExtra}
        </div>
      </div>
    </div>
    <div class="bottom-bar fade-in">`;

  if(flipped) {
    html+=`
      <button class="ans-btn again" onclick="event.stopPropagation();answer(0)">&#x1F504; Ещё</button>
      <button class="ans-btn hard" onclick="event.stopPropagation();answer(1)">&#x1F914; Трудно</button>
      <button class="ans-btn good" onclick="event.stopPropagation();answer(2)">&#x2705; Знаю</button>`;
  }

  html+=`
      <button class="next-arrow" onclick="event.stopPropagation();skipCard()" title="Дальше (без оценки)">&#x27A1;</button>
    </div>
    <div class="kbd-hints"><span class="kbd">Space</span> flip &nbsp; <span class="kbd">&#x2192;</span> next &nbsp; <span class="kbd">1</span> again <span class="kbd">2</span> hard <span class="kbd">3</span> good</div>`;
  return html;
}

function renderQuiz() {
  if(!deck.length) buildDeck();
  if(deckIdx>=deck.length) return renderDone();
  const card=deck[deckIdx];
  const front=getFront(card);
  const pct=deck.length>0?Math.round((deckIdx/deck.length)*100):0;

  let options=[card];
  const others=cards.filter(c=>c.id!==card.id);
  const sh=shuffle(others);
  for(let i=0;options.length<4&&i<sh.length;i++) options.push(sh[i]);
  options=shuffle(options);

  let html=`
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card-container" style="min-height:120px;align-items:flex-end">
      <div style="text-align:center">
        <div style="font-size:.75em;color:var(--text2);margin-bottom:8px">${front.lang} &#x2192; ${currentDir==='ru_pl'?'PL':'RU'} &nbsp; (${deckIdx+1}/${deck.length})</div>
        <div class="card-word" style="font-size:1.5em">${front.text}</div>
      </div>
    </div>
    <div class="quiz-options">`;

  options.forEach((opt,i) => {
    const back=getBack(opt);
    let cls='';
    if(quizAnswer!==null){
      if(opt.id===card.id) cls='correct';
      else if(quizAnswer===i&&opt.id!==card.id) cls='wrong';
    }
    const dis=quizAnswer!==null?'pointer-events:none':'';
    html+=`<div class="quiz-opt ${cls}" style="${dis}" onclick="quizSelect(${i},${opt.id===card.id})">${back.text}</div>`;
  });

  html+=`</div>`;
  if(quizAnswer!==null) {
    const card2=deck[deckIdx];
    let ex='';
    if(card2.exPl) ex=`<div style="text-align:center;margin-top:10px;font-size:.82em;color:var(--text2)"><strong style="color:var(--text)">${card2.exPl}</strong><br>${card2.exRu}</div>`;
    html+=ex+`<div style="text-align:center;margin-top:12px"><button class="next-arrow" onclick="nextQuiz()" style="display:inline-flex">&#x27A1;</button></div>`;
  }
  return html;
}

function renderBrowse() {
  let filtered=cards;
  if(searchQuery){const q=searchQuery.toLowerCase();filtered=filtered.filter(c=>c.pl.toLowerCase().includes(q)||c.ru.toLowerCase().includes(q));}
  if(filterStatus!=='all') filtered=filtered.filter(c=>getStatus(c.id)===filterStatus);
  let html=`
    <div class="filter-bar">
      <input type="text" placeholder="Szukaj / Искать..." value="${searchQuery}" oninput="searchQuery=this.value;render()">
      <button class="filter-btn ${filterStatus==='all'?'active':''}" onclick="filterStatus='all';render()">Wszystko</button>
      <button class="filter-btn ${filterStatus==='new'?'active':''}" onclick="filterStatus='new';render()">Nowe</button>
      <button class="filter-btn ${filterStatus==='learning'?'active':''}" onclick="filterStatus='learning';render()">Uczenie</button>
      <button class="filter-btn ${filterStatus==='known'?'active':''}" onclick="filterStatus='known';render()">Znane</button>
    </div>
    <div style="font-size:.75em;color:var(--text2);margin-bottom:8px">${filtered.length} kart</div>
    <div class="browse-list">`;

  filtered.forEach(c => {
    const s=getStatus(c.id);
    const sC=s==='new'?'new':s==='learning'?'learning':'known';
    const sL=s==='new'?'Nowa':s==='learning'?'Uczenie':'Znana';
    html+=`
      <div class="browse-item" onclick="this.querySelector('.detail').style.display=this.querySelector('.detail').style.display==='none'?'block':'none'">
        <span class="status ${sC}">${sL}</span>
        <div class="pl">${c.pl}</div>
        <div class="ru">${c.ru}</div>
        <div class="detail" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)">
          ${c.exPl?`<div style="font-size:.82em;color:var(--text2)"><strong style="color:var(--text)">${c.exPl}</strong><br>${c.exRu}</div>`:''}
        </div>
      </div>`;
  });

  html+=`</div>`;
  if(Object.keys(progress).length>0){
    html+=`<div style="text-align:center;margin-top:16px"><button class="restart-btn" onclick="if(confirm('Сбросить весь прогресс?')){progress={};saveProgress(progress);render()}" style="background:var(--card);border:1px solid var(--red);padding:8px 20px;font-size:.8em">&#x1F5D1; Сбросить прогресс</button></div>`;
  }
  return html;
}

function renderDone() {
  const rated=sessionStats.good+sessionStats.hard+sessionStats.again;
  const pct=rated>0?Math.round((sessionStats.good/rated)*100):0;
  const emoji=pct>=80?'&#x1F389;':pct>=50?'&#x1F44D;':'&#x1F4AA;';
  return `
    <div class="session-done fade-in">
      <div class="emoji">${emoji}</div>
      <h2>Sesja zakończona!</h2>
      <p>Пройдено: ${sessionStats.total} &bull; Знаю: ${sessionStats.good} &bull; Трудно: ${sessionStats.hard} &bull; Ещё раз: ${sessionStats.again} &bull; Пропущено: ${sessionStats.skipped}</p>
      <div style="margin-bottom:20px">
        <div class="progress-wrap" style="height:10px"><div class="progress-fill" style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)'}"></div></div>
        <div style="font-size:.8em;color:var(--text2);margin-top:4px">${rated>0?pct+'% правильных':'Оценок не было'}</div>
      </div>
      <button class="restart-btn" onclick="buildDeck();render()">&#x1F504; Nowa sesja</button>
    </div>`;
}

function setMode(m){currentMode=m;if(m!=='browse')buildDeck();quizAnswer=null;render();}
function setDir(d){currentDir=d;buildDeck();quizAnswer=null;render();}
function flipCard(){flipped=!flipped;render();}

function skipCard() {
  sessionStats.skipped++;
  sessionStats.total++;
  deckIdx++;
  flipped=false;
  render();
}

function answer(score) {
  const card=deck[deckIdx];
  const p=progress[card.id]||{score:0,reviews:0};
  p.reviews++;
  if(score===0){p.score=Math.max(0,p.score-1);sessionStats.again++;}
  else if(score===1){p.score=Math.min(p.score+1,5);sessionStats.hard++;}
  else{p.score=Math.min(p.score+2,5);sessionStats.good++;}
  p.lastReview=Date.now();
  progress[card.id]=p;
  saveProgress(progress);
  sessionStats.total++;
  if(score===0){const later=Math.min(deckIdx+3+Math.floor(Math.random()*4),deck.length);deck.splice(later,0,card);}
  deckIdx++;flipped=false;render();
}

function quizSelect(idx,correct) {
  quizAnswer=idx;
  const card=deck[deckIdx];
  const p=progress[card.id]||{score:0,reviews:0};
  p.reviews++;
  if(correct){p.score=Math.min(p.score+2,5);sessionStats.good++;}
  else{p.score=Math.max(0,p.score-1);sessionStats.again++;}
  p.lastReview=Date.now();
  progress[card.id]=p;
  saveProgress(progress);
  sessionStats.total++;
  render();
}
function nextQuiz(){quizAnswer=null;deckIdx++;render();}

document.addEventListener('keydown',e=>{
  if(currentMode==='study'){
    if(e.code==='Space'){e.preventDefault();flipCard();}
    if(e.code==='ArrowRight'){e.preventDefault();skipCard();}
    if(flipped&&e.key==='1')answer(0);
    if(flipped&&e.key==='2')answer(1);
    if(flipped&&e.key==='3')answer(2);
  }
  if(currentMode==='quiz'&&quizAnswer!==null){
    if(e.code==='Space'||e.code==='Enter'||e.code==='ArrowRight'){e.preventDefault();nextQuiz();}
  }
});

buildDeck();render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
